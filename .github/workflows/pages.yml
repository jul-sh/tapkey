name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - web/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - uses: cachix/install-nix-action@v31

      - name: Build WASM
        run: nix develop -c wasm-pack build --target web web/wasm --out-dir ../pkg

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/.well-known _site/pkg
          cp web/CNAME web/index.html web/app.html web/app.css web/app.js _site/
          cp web/state.js web/nearby-bridge.js web/nearby.css web/nearby.html web/nearby.js _site/
          cp web/pkg/tapkey_web.js web/pkg/tapkey_web_bg.wasm web/pkg/tapkey_web.d.ts _site/pkg/
          touch _site/.nojekyll

          if [ -n "${APPLE_TEAM_ID}" ]; then
            printf '{"webcredentials":{"apps":["%s.sh.jul.tapkey"]}}' "$APPLE_TEAM_ID" > _site/.well-known/apple-app-site-association
          else
            echo "::warning::Repository variable APPLE_TEAM_ID is not set; skipping apple-app-site-association."
          fi
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
