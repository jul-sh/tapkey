name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - CNAME
      - index.html
      - nearby.css
      - nearby.html
      - nearby.js
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/.well-known
          cp CNAME index.html nearby.css nearby.html nearby.js _site/
          touch _site/.nojekyll

          if [ -n "${APPLE_TEAM_ID}" ]; then
            python3 - <<'PY' > _site/.well-known/apple-app-site-association
import json
import os

bundle_id = "sh.jul.tapkey"
team_id = os.environ["APPLE_TEAM_ID"]
payload = {
    "webcredentials": {
        "apps": [f"{team_id}.{bundle_id}"]
    }
}

print(json.dumps(payload, separators=(",", ":")))
PY
          else;
            echo "::warning::Repository variable APPLE_TEAM_ID is not set; skipping apple-app-site-association."
          fi
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
