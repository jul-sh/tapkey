name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - .well-known/**
      - web/**
      - README.md
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare site
        run: |
          sudo apt-get install -y pandoc

          mkdir -p _site/.well-known
          cp .well-known/apple-app-site-association _site/.well-known/
          cp web/CNAME _site/
          cp web/*.js web/*.css _site/ 2>/dev/null || true

          # Convert README to HTML fragment, strip the icon img tag (not served)
          pandoc README.md --from gfm --to html5 --no-highlight \
            | sed 's|<img[^>]*macos/tapkey.icon[^>]*>||' \
            > /tmp/readme.html

          # Inject into template
          sed '/<!-- CONTENT -->/r /tmp/readme.html' web/index.html \
            | sed '/<!-- CONTENT -->/d' \
            > _site/index.html

          # Copy nearby page directly
          cp web/nearby.html _site/nearby.html 2>/dev/null || true

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
