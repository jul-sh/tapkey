name: Re-encrypt secrets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reencrypt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install age
        run: |
          curl -sL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz | tar xz
          sudo mv age/age age/age-keygen /usr/local/bin/

      - name: Re-encrypt all secrets
        run: |
          RECIPIENTS_FILE="distribution/secrets/age-recipients.txt"
          RECIPIENT_ARGS=""
          while IFS= read -r line; do
            line="$(echo "$line" | sed 's/#.*//' | xargs)"
            [ -z "$line" ] && continue
            RECIPIENT_ARGS="$RECIPIENT_ARGS -r $line"
          done < "$RECIPIENTS_FILE"

          for secret in distribution/secrets/*.age; do
            echo "Re-encrypting $secret"
            PLAINTEXT=$(echo "$AGE_SECRET_KEY" | age -d -i - "$secret")
            printf '%s' "$PLAINTEXT" | age $RECIPIENT_ARGS -o "$secret"
          done
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Commit updated secrets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add distribution/secrets/*.age
          git commit -m "Re-encrypt secrets with updated recipients" || echo "No changes to commit"
          git push
