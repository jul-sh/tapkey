name: Tagged Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-macos:
    if: github.event_name == 'push' || startsWith(github.event.release.tag_name, 'v')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31

      - name: Build, sign, notarize, and package
        id: package
        run: |
          nix develop --command make package
          TAG="${GITHUB_REF#refs/tags/}"
          SHA="${GITHUB_SHA::7}"
          # Rename from SHA-based to tag-based name
          mv "keytap-${SHA}-arm64.zip" "keytap-${TAG}-arm64.zip"
          echo "zip_name=keytap-${TAG}-arm64.zip" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Attest
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ steps.package.outputs.zip_name }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-arm64
          path: ${{ steps.package.outputs.zip_name }}

    outputs:
      tag: ${{ steps.package.outputs.tag }}
      zip_name: ${{ steps.package.outputs.zip_name }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build
        id: package
        run: |
          cargo build --release -p keytap --no-default-features
          TAG="${GITHUB_REF#refs/tags/}"
          ZIP_NAME="keytap-${TAG}-linux-x86_64.zip"
          zip "$ZIP_NAME" -j target/release/keytap
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Attest
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ steps.package.outputs.zip_name }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-x86_64
          path: ${{ steps.package.outputs.zip_name }}

    outputs:
      zip_name: ${{ steps.package.outputs.zip_name }}

  release:
    needs: [build-macos, build-linux]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create or update release
        run: |
          if gh release view "$TAG" &>/dev/null; then
            # Release exists (e.g. created via UI) — upload assets to it
            gh release upload "$TAG" \
              "artifacts/macos-arm64/$MACOS_ZIP" \
              "artifacts/linux-x86_64/$LINUX_ZIP" \
              --clobber
          else
            gh release create "$TAG" \
              "artifacts/macos-arm64/$MACOS_ZIP" \
              "artifacts/linux-x86_64/$LINUX_ZIP" \
              --title "keytap $TAG" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-macos.outputs.tag }}
          MACOS_ZIP: ${{ needs.build-macos.outputs.zip_name }}
          LINUX_ZIP: ${{ needs.build-linux.outputs.zip_name }}

      - name: Update flake.nix with new release
        run: |
          TAG="${{ needs.build-macos.outputs.tag }}"
          MACOS_ZIP="${{ needs.build-macos.outputs.zip_name }}"
          LINUX_ZIP="${{ needs.build-linux.outputs.zip_name }}"

          MACOS_HASH=$(nix hash file --sri "artifacts/macos-arm64/$MACOS_ZIP")
          LINUX_HASH=$(nix hash file --sri "artifacts/linux-x86_64/$LINUX_ZIP")

          MACOS_URL="https://github.com/jul-sh/keytap/releases/download/${TAG}/${MACOS_ZIP}"
          LINUX_URL="https://github.com/jul-sh/keytap/releases/download/${TAG}/${LINUX_ZIP}"

          # Switch to main branch for the commit (tag checkout is detached HEAD)
          git fetch origin main
          git checkout main

          VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          python3 -c "
          import re, sys
          with open('flake.nix') as f: s = f.read()
          s = re.sub(r'version = \"[^\"]+\"', 'version = \"${VERSION}\"', s, count=1)
          s = re.sub(
              r'aarch64-darwin = \{[^}]+\}',
              'aarch64-darwin = {\n            url = \"${MACOS_URL}\";\n            hash = \"${MACOS_HASH}\";\n          }',
              s
          )
          s = re.sub(
              r'x86_64-linux = \{[^}]+\}',
              'x86_64-linux = {\n            url = \"${LINUX_URL}\";\n            hash = \"${LINUX_HASH}\";\n          }',
              s
          )
          with open('flake.nix', 'w') as f: f.write(s)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "Update flake.nix with release ${TAG}" || true
          git push origin main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
