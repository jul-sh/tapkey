name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Decrypt secrets
        id: secrets
        run: |
          brew install age
          echo "$AGE_SECRET_KEY" > "$RUNNER_TEMP/age-key.txt"
          chmod 600 "$RUNNER_TEMP/age-key.txt"
          for f in secrets/*.age; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .age)
            value=$(age -d -i "$RUNNER_TEMP/age-key.txt" "$f")
            echo "::add-mask::$value"
            {
              echo "${name}<<AGEDELIM"
              echo "$value"
              echo "AGEDELIM"
            } >> "$GITHUB_OUTPUT"
          done
          rm -f "$RUNNER_TEMP/age-key.txt"
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Import certificate
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
        env:
          P12_BASE64: ${{ steps.secrets.outputs.MACOS_P12_BASE64 }}
          P12_PASSWORD: ${{ steps.secrets.outputs.MACOS_P12_PASSWORD }}

      - name: Build
        run: make build

      - name: Sign
        run: |
          make sign IDENTITY="${{ steps.secrets.outputs.SIGNING_IDENTITY || 'Apple Development' }}"

      - name: Verify signature
        run: make verify

      - name: Remove quarantine and package
        id: package
        run: |
          xattr -cr Tapkey.app
          TAG="${GITHUB_REF#refs/tags/}"
          ZIP_NAME="tapkey-${TAG}-arm64.zip"
          ditto -c -k --keepParent Tapkey.app "$ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Attest
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ steps.package.outputs.zip_name }}

      - name: Create release
        run: |
          gh release create "$TAG" "$ZIP_NAME" \
            --title "tapkey $TAG" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.package.outputs.tag }}
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
