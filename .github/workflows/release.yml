name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31

      - name: Build, sign, notarize, and package
        id: package
        run: |
          nix develop --command make package
          SHA="${GITHUB_SHA::7}"
          echo "zip_name=keytap-${SHA}-arm64.zip" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Attest
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ steps.package.outputs.zip_name }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-arm64
          path: ${{ steps.package.outputs.zip_name }}

    outputs:
      sha: ${{ steps.package.outputs.sha }}
      zip_name: ${{ steps.package.outputs.zip_name }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build
        id: package
        run: |
          cargo build --release -p keytap --no-default-features
          SHA="${GITHUB_SHA::7}"
          ZIP_NAME="keytap-${SHA}-linux-x86_64.zip"
          zip "$ZIP_NAME" -j target/release/keytap
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Attest
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ steps.package.outputs.zip_name }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-x86_64
          path: ${{ steps.package.outputs.zip_name }}

    outputs:
      zip_name: ${{ steps.package.outputs.zip_name }}

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create release
        run: |
          gh release create "$SHA" \
            "artifacts/macos-arm64/$MACOS_ZIP" \
            "artifacts/linux-x86_64/$LINUX_ZIP" \
            --title "keytap $SHA" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ needs.build-macos.outputs.sha }}
          MACOS_ZIP: ${{ needs.build-macos.outputs.zip_name }}
          LINUX_ZIP: ${{ needs.build-linux.outputs.zip_name }}
