<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    // Route /n/{sessionId} to the nearby page
    const m = location.pathname.match(/^\/n\/([a-zA-Z0-9_-]{8,44})$/);
    if (m) {
      // Rewrite to /nearby with session ID in hash (preserves static hosting)
      location.replace('/nearby#s=' + m[1]);
    }
  </script>
  <title>keytap — not found</title>
</head>
<body>
  <p>Page not found.</p>
</body>
</html>
